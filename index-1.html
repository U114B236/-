<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Survival: Infinite Arena</title>
<style>
    body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; user-select: none; }
    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffff; box-shadow: 0 0 8px #00ffff; }
    #crosshair::before { top: 8px; left: -12px; width: 44px; height: 2px; }
    #crosshair::after { top: -12px; left: 8px; width: 2px; height: 44px; }

    #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 18px; pointer-events: none; z-index: 10; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }
    .stat { margin-bottom: 8px; display: flex; align-items: center; }
    #hp-bar-container { width: 220px; height: 18px; background: rgba(255,255,255,0.15); border: 2px solid #ff0055; border-radius: 999px; overflow: hidden; margin-left: 10px; }
    #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff4488); transition: width 0.15s; }

    #menu {
        position: absolute; inset: 0; background: rgba(5,5,15,0.92); backdrop-filter: blur(12px);
        color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 100; text-align: center;
    }
    h1 { font-size: 52px; margin: 0; color: #00ffff; text-shadow: 0 0 25px #00ffff; }
    .btn {
        margin-top: 30px; padding: 16px 50px; font-size: 24px; font-weight: bold;
        background: linear-gradient(45deg, #00ffff, #ff00ff); border: none;
        border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,255,0.6);
    }
    .btn:hover { transform: scale(1.08); }
</style>
</head>
<body>
<div id="damage-flash"></div>
<div id="ui">
    <div class="stat">血量 HP: <div id="hp-bar-container"><div id="hp-bar"></div></div></div>
    <div class="stat">分數 SCORE: <span id="score">0</span></div>
    <div class="stat">武器等級 LV: <span id="level">1</span></div>
</div>

<div id="menu">
    <h1 id="menu-title">賽博朋克：無限殺怪生存戰</h1>
    <p id="menu-desc">敵人將從迷霧中湧出，你能活多久？</p>
    <button class="btn" id="start-btn">進入戰場</button>
</div>
<div id="crosshair"></div>

<script type="module">
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js';
import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.134.0/examples/jsm/controls/PointerLockControls.js';

let scene, camera, renderer, controls;
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let isShooting = false;
let prevTime = performance.now();

const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

let playerHp = 100, playerScore = 0, weaponLevel = 1, isGameOver = false;
let lastShotTime = 0, lastSpawnTime = 0;

const MAX_BULLETS = 80;
const MAX_ENEMIES = 45;
const MAX_PARTICLES = 180;

const bulletPool = [], enemyPool = [], particlePool = [];
let bullets = [], enemies = [], particles = [];

const gunSettings = {
    1: { cooldown: 260, speed: 170, size: 0.18, color: 0xff00ff },
    2: { cooldown: 150, speed: 200, size: 0.22, color: 0x00ffff },
    3: { cooldown: 85,  speed: 230, size: 0.26, color: 0xffff00 },
    4: { cooldown: 50,  speed: 270, size: 0.31, color: 0xff2200 }
};

const menu = document.getElementById('menu');
const startBtn = document.getElementById('start-btn');
const hpBar = document.getElementById('hp-bar');
const scoreUi = document.getElementById('score');
const levelUi = document.getElementById('level');
const damageFlash = document.getElementById('damage-flash');

startBtn.addEventListener('click', () => { if(isGameOver) resetGame(); controls.lock(); });

init();
animate();

function init() {
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020208);
    scene.fog = new THREE.FogExp2(0x020208, 0.032);

    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.y = 2;

    controls = new PointerLockControls(camera, document.body);
    controls.addEventListener('lock', () => menu.style.display = 'none');
    controls.addEventListener('unlock', () => { if(!isGameOver) menu.style.display = 'flex'; });
    scene.add(controls.getObject());

    scene.add(new THREE.AmbientLight(0xffffff, 0.25));
    const dirLight = new THREE.DirectionalLight(0xaaccff, 1.0);
    dirLight.position.set(30, 50, 40);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshStandardMaterial({ color: 0x0a0a12, roughness: 0.6, metalness: 0.4 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    scene.add(new THREE.GridHelper(200, 60, 0xff00aa, 0x111133));

    // 輸入控制
    document.addEventListener('keydown', e => {
        if(e.code === 'KeyW') moveForward = true;
        if(e.code === 'KeyS') moveBackward = true;
        if(e.code === 'KeyA') moveLeft = true;
        if(e.code === 'KeyD') moveRight = true;
    });
    document.addEventListener('keyup', e => {
        if(e.code === 'KeyW') moveForward = false;
        if(e.code === 'KeyS') moveBackward = false;
        if(e.code === 'KeyA') moveLeft = false;
        if(e.code === 'KeyD') moveRight = false;
    });

    document.addEventListener('mousedown', e => { if(e.button === 0) isShooting = true; });
    document.addEventListener('mouseup',   e => { if(e.button === 0) isShooting = false; });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function getBullet() {
    if (bulletPool.length > 0) return bulletPool.pop();
    return new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 6), new THREE.MeshBasicMaterial());
}

function getEnemy(isHeavy) {
    if (enemyPool.length > 0) return enemyPool.pop();
    const size = isHeavy ? 2.3 : 1.45;
    return new THREE.Mesh(new THREE.BoxGeometry(size, size, size), new THREE.MeshStandardMaterial());
}

function getParticle() {
    if (particlePool.length > 0) return particlePool.pop();
    return new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.22), new THREE.MeshBasicMaterial());
}

function spawnEnemy() {
    if (enemies.length >= MAX_ENEMIES) return;
    const playerPos = controls.getObject().position;
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 15;
    const isHeavy = Math.random() > 0.67;

    const enemy = getEnemy(isHeavy);
    enemy.position.set(
        playerPos.x + Math.cos(angle) * dist,
        isHeavy ? 1.15 : 0.725,
        playerPos.z + Math.sin(angle) * dist
    );

    const speed = isHeavy ? 4.2 + playerScore/300 : 7.8 + playerScore/300;
    enemy.userData = { hp: isHeavy?3:1, maxHp: isHeavy?3:1, speed, size: isHeavy?2.3:1.45, hitFlash: 0, isHeavy };
    enemy.material.color.setHex(isHeavy ? 0x9900ff : 0xff3366);
    enemy.material.emissive.setHex(isHeavy ? 0x9900ff : 0xff3366);
    enemy.material.emissiveIntensity = 0.6;

    scene.add(enemy);
    enemies.push(enemy);
}

function shootBullet() {
    if (bullets.length >= MAX_BULLETS) return;
    const setting = gunSettings[weaponLevel];
    const bullet = getBullet();
    bullet.material.color.setHex(setting.color);
    bullet.scale.setScalar(setting.size * 5);

    const playerPos = controls.getObject().position;
    bullet.position.copy(playerPos);
    bullet.position.y += 0.4;

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    bullet.userData = { direction: dir, speed: setting.speed, aliveTime: 0 };

    scene.add(bullet);
    bullets.push(bullet);

    camera.position.y += 0.05;
    setTimeout(() => camera.position.y = 2, 55);
}

function createExplosion(pos, color, count = 14) {
    for(let i = 0; i < count && particles.length < MAX_PARTICLES; i++){
        const p = getParticle();
        p.material.color.setHex(color);
        p.position.copy(pos);
        p.userData = {
            velocity: new THREE.Vector3((Math.random()-0.5)*16, Math.random()*13 + 5, (Math.random()-0.5)*16),
            aliveTime: 0
        };
        scene.add(p);
        particles.push(p);
    }
}

function damagePlayer(amount) {
    if(isGameOver) return;
    playerHp -= amount;
    hpBar.style.width = Math.max(0, playerHp) + '%';
    damageFlash.style.boxShadow = 'inset 0 0 120px rgba(255,0,80,0.85)';
    setTimeout(() => damageFlash.style.boxShadow = '', 140);
    if(playerHp <= 0) gameOver();
}

function gameOver() {
    isGameOver = true;
    controls.unlock();
    document.getElementById('menu-title').innerHTML = '戰魂熄滅 💀';
    document.getElementById('menu-title').style.color = '#ff0055';
    document.getElementById('menu-desc').innerHTML = `最終得分：${playerScore}<br>最高武器等級：LV ${weaponLevel}`;
    startBtn.textContent = '再次挑戰';
}

function resetGame() {
    bullets.forEach(b => { scene.remove(b); bulletPool.push(b); });
    enemies.forEach(e => { scene.remove(e); enemyPool.push(e); });
    particles.forEach(p => { scene.remove(p); particlePool.push(p); });
    
    bullets = []; enemies = []; particles = [];

    playerHp = 100; playerScore = 0; weaponLevel = 1; isGameOver = false;
    hpBar.style.width = '100%';
    scoreUi.textContent = '0';
    levelUi.textContent = '1';
    controls.getObject().position.set(0, 2, 0);
}

function animate() {
    requestAnimationFrame(animate);
    const time = performance.now();
    const delta = Math.min((time - prevTime) / 1000, 0.1);
    prevTime = time;

    if (!controls.isLocked || isGameOver) {
        renderer.render(scene, camera);
        return;
    }

    // 移動
    velocity.multiplyScalar(0.88);
    direction.set(Number(moveRight) - Number(moveLeft), 0, Number(moveBackward) - Number(moveForward));
    if (direction.lengthSq() > 0) {
        direction.normalize().multiplyScalar(160 * delta);
        velocity.add(direction);
    }
    controls.moveRight(velocity.x * delta);
    controls.moveForward(velocity.z * delta);

    const pPos = controls.getObject().position;
    pPos.x = Math.max(-95, Math.min(95, pPos.x));
    pPos.z = Math.max(-95, Math.min(95, pPos.z));

    // 射擊
    const setting = gunSettings[weaponLevel];
    if (isShooting && time - lastShotTime > setting.cooldown) {
        shootBullet();
        lastShotTime = time;
    }

    // 生成敵人
    const spawnRate = Math.max(280, 1350 - playerScore * 1.6);
    if (time - lastSpawnTime > spawnRate) {
        spawnEnemy();
        lastSpawnTime = time;
    }

    // 敵人更新
    for(let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.userData.hitFlash > 0) {
            e.userData.hitFlash -= delta * 7;
            e.material.emissiveIntensity = 0.6 + e.userData.hitFlash * 3.5;
        }

        const dir = new THREE.Vector3().subVectors(pPos, e.position);
        const dist = dir.length();
        if (dist > 0.1) {
            dir.y = 0; dir.normalize();
            e.position.addScaledVector(dir, e.userData.speed * delta);
        }
        e.lookAt(pPos.x, e.position.y, pPos.z);

        if (dist < e.userData.size * 0.7) {
            damagePlayer(e.userData.isHeavy ? 28 : 16);
            createExplosion(e.position, e.material.color.getHex(), 10);
            scene.remove(e);
            enemyPool.push(e);
            enemies.splice(i, 1);
        }
    }

    // 子彈更新
    for(let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.position.addScaledVector(b.userData.direction, b.userData.speed * delta);
        b.userData.aliveTime += delta;

        let hit = false;
        for(let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (b.position.distanceTo(e.position) < e.userData.size * 0.65) {
                hit = true;
                e.userData.hp--;
                e.userData.hitFlash = 1.1;

                if (e.userData.hp <= 0) {
                    createExplosion(e.position, e.material.color.getHex(), 20);
                    playerScore += e.userData.maxHp === 3 ? 150 : 50;
                    scoreUi.textContent = playerScore;

                    const newLv = Math.min(4, Math.floor(playerScore / 460) + 1);
                    if (newLv > weaponLevel) {
                        weaponLevel = newLv;
                        levelUi.textContent = weaponLevel;
                    }

                    scene.remove(e);
                    enemyPool.push(e);
                    enemies.splice(j, 1);
                }
                break;
            }
        }

        if (hit || b.userData.aliveTime > 1.4 || b.position.y < 0) {
            scene.remove(b);
            bulletPool.push(b);
            bullets.splice(i, 1);
        }
    }

    // 粒子更新
    for(let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.velocity.y -= 32 * delta;
        p.position.addScaledVector(p.userData.velocity, delta);
        p.userData.aliveTime += delta;

        if (p.userData.aliveTime > 0.65 || p.position.y < 0) {
            scene.remove(p);
            particlePool.push(p);
            particles.splice(i, 1);
        }
    }

    renderer.render(scene, camera);
}
</script>
</body>
</html>
